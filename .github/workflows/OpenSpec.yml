name: Validate OpenSpec

on:
  pull_request:
    paths:
      - ".codex/**"
      - "openspec/**"
      - ".github/workflows/OpenSpec.yml"
  push:
    branches:
      - master
    paths:
      - ".codex/**"
      - "openspec/**"
      - ".github/workflows/OpenSpec.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate specs and changes
        run: npx -y @fission-ai/openspec@1.6.0 validate --all --strict --no-interactive
